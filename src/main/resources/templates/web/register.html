<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký hội viên</title>
    <link rel="stylesheet" th:href="@{/css/webapp.css}">
</head>
<body class="auth-page">
<main class="auth-shell register-layout">
    <section class="auth-copy">
        <p class="eyebrow">Đăng ký hội viên</p>
        <h1>Tạo tài khoản web cho hội viên mới.</h1>
        <p>Sau bước này hệ thống sẽ gửi mã OTP đến email. Nhập đúng OTP thì tài khoản mới được tạo trong CSDL.</p>
    </section>

    <section class="auth-panel">
        <h2>Tạo tài khoản</h2>
        <p class="flash error" th:if="${error}" th:text="${error}"></p>
        <form th:action="@{/register}" th:object="${registerForm}" method="post" class="form-grid">
            <label>
                Họ tên
                <input type="text" th:field="*{fullName}" placeholder="Nguyễn Văn A">
                <span class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></span>
            </label>
            <label>
                Tên tài khoản
                <input type="text" th:field="*{username}" placeholder="nguyenvana">
                <span class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
            </label>
            <label>
                Email nhận OTP
                <input type="email" th:field="*{email}" placeholder="name@example.com">
                <span class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </label>
            <label>
                Mật khẩu
                <input type="password" th:field="*{password}" placeholder="Tối thiểu 6 ký tự">
                <span class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
            </label>
            <label>
                Nhập lại mật khẩu
                <input type="password" th:field="*{confirmPassword}" placeholder="Nhập lại mật khẩu">
                <span class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></span>
            </label>
            <button type="submit" class="button-primary full-width">Gửi mã OTP</button>
        </form>
        <p class="auth-footnote">Đã có tài khoản? <a th:href="@{/login}">Quay về đăng nhập</a></p>
    </section>
</main>
</body>
</html>
