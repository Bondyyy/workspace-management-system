<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tài khoản - Spring MNGT</title>
    <link rel="stylesheet" href="/css/webapp.css">
</head>
<body class="member-page">
<aside class="member-sidebar">
    <a class="member-brand" th:href="@{/portal}">
        <strong>SPRING MNGT</strong>
        <span>MEMBER PORTAL</span>
    </a>
    <nav class="member-nav">
        <a th:href="@{/portal}">Trang chủ</a>
        <a th:href="@{/portal/branches}">Đặt chỗ không gian</a>
        <a th:href="@{/portal/benefits}">Ưu đãi của tôi</a>
        <a th:href="@{/portal/account}" class="active">Thông tin tài khoản</a>
    </nav>
    <form th:action="@{/logout}" method="post" class="member-logout">
        <button type="submit">← Đăng xuất</button>
    </form>
</aside>

<main class="member-main">
    <header class="member-topbar">
        <h1>Xin chào <span th:text="${user.hoTen}">Hội viên</span>!</h1>
        <strong>Hạng: VIP Kim Cương</strong>
    </header>

    <section class="member-content">
        <div class="section-title">
            <p>Thông tin tài khoản</p>
            <h2>Hồ sơ cá nhân</h2>
        </div>

        <div class="account-grid">
            <aside class="profile-card">
                <div class="avatar-box">Ảnh đại diện</div>
                <button type="button" class="button-secondary full-width">Thay đổi ảnh</button>
                <h3 th:text="${user.hoTen}">Hội viên</h3>
                <strong>VIP Kim Cương</strong>
                <p th:text="'Tham gia từ: ' + ${#temporals.format(joinDate, 'dd/MM/yyyy')}">Tham gia từ</p>
                <p th:text="'Số yêu cầu đặt chỗ: ' + ${bookingCount}">0</p>
            </aside>

            <section class="member-panel account-panel">
                <h3>Hồ sơ cá nhân</h3>
                <form class="readonly-grid">
                    <label>
                        Họ và tên
                        <input type="text" th:value="${user.hoTen}">
                    </label>
                    <label>
                        Số điện thoại
                        <input type="text" placeholder="Chưa cập nhật">
                    </label>
                    <label>
                        Email hoặc tài khoản
                        <input type="text" th:value="${user.tenTaiKhoan}" readonly>
                    </label>
                    <label>
                        Ngày sinh
                        <input type="text" placeholder="dd/MM/yyyy">
                    </label>
                    <label>
                        Giới tính
                        <select>
                            <option>Nam</option>
                            <option>Nữ</option>
                            <option>Khác</option>
                        </select>
                    </label>
                    <div></div>
                    <button type="button" class="button-primary">Cập nhật thông tin</button>
                </form>

                <hr>
                <h3>Bảo mật & mật khẩu</h3>
                <form class="password-row">
                    <label>
                        Mật khẩu hiện tại
                        <input type="password">
                    </label>
                    <label>
                        Mật khẩu mới
                        <input type="password">
                    </label>
                    <label>
                        Xác nhận mật khẩu
                        <input type="password">
                    </label>
                    <button type="button" class="button-dark">Đổi mật khẩu</button>
                </form>
            </section>
        </div>
    </section>
</main>
</body>
</html>
