<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác thực OTP - Spring Workspace</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="/css/webapp.css">
</head>
<body class="workspace-auth-page">
<main class="workspace-auth">
    <section class="auth-glass otp-glass">
        <a class="auth-brand" th:href="@{/}">SPRING WORKSPACE</a>
        <div class="auth-title">
            <h1>Xác thực OTP</h1>
            <p>Mã đã gửi tới <strong th:text="${email}"></strong></p>
        </div>

        <div th:replace="~{web/fragments/alerts :: messages}"></div>

        <form th:action="@{/register/verify}" th:object="${MaOtpForm}" method="post" class="workspace-form">
            <label>
                Nhập mã OTP
                <input class="otp-input" type="text" inputmode="numeric" maxlength="6" th:field="*{otp}" placeholder="000000">
                <span class="field-error" th:if="${#fields.hasErrors('otp')}" th:errors="*{otp}"></span>
            </label>
            <button type="submit" class="pink-button submit">Xác thực và tạo tài khoản</button>
        </form>

        <p class="auth-switch">Sai email? <a th:href="@{/register}">Đăng ký lại</a></p>
    </section>

    <section class="auth-hero-copy">
        <div>
            <h2>SPRING WORKSPACE</h2>
            <p>Hoàn tất xác thực để bắt đầu đặt chỗ trực tiếp trên web.</p>
        </div>
    </section>
</main>
</body>
</html>
