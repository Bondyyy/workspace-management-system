<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Spring Workspace</title>
    <link rel="stylesheet" href="/css/webapp.css">
</head>
<body class="workspace-auth-page">
<main class="workspace-auth">
    <section class="auth-glass">
        <a class="auth-brand" th:href="@{/}">SPRING WORKSPACE</a>
        <div class="auth-title">
            <h1>Spring xin chào</h1>
            <p>Đăng nhập để vào hệ thống</p>
        </div>

        <div th:replace="~{web/fragments/alerts :: messages}"></div>

        <form th:action="@{/dangNhap}" th:object="${DangNhapWebForm}" method="post" class="workspace-form">
            <label>
                Tên tài khoản (Email hoặc SĐT)
                <input type="text" th:field="*{tenTaiKhoan}">
                <span class="field-error" th:if="${#fields.hasErrors('tenTaiKhoan')}" th:errors="*{tenTaiKhoan}"></span>
            </label>
            <label>
                Mật khẩu
                <input type="password" th:field="*{matKhau}">
                <span class="field-error" th:if="${#fields.hasErrors('matKhau')}" th:errors="*{matKhau}"></span>
            </label>
            <a class="form-link right" href="#">Quên mật khẩu?</a>
            <button type="submit" class="pink-button submit">Đăng nhập</button>
        </form>

        <p class="auth-switch">Chưa có tài khoản? <a th:href="@{/register}">Đăng ký ngay</a></p>
    </section>

    <section class="auth-hero-copy">
        <div>
            <h2>SPRING WORKSPACE</h2>
            <p>Nơi hội tụ của những ý tưởng đột phá và cộng đồng sáng tạo. Trải nghiệm đặt chỗ tiện nghi, nhanh và chuyên nghiệp.</p>
        </div>
    </section>
</main>
</body>
</html>
