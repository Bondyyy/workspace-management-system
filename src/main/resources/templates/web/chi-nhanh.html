<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chọn chi nhánh - Spring MNGT</title>
    <link rel="stylesheet" href="/css/webapp.css">
</head>
<body class="member-page">
<aside class="member-sidebar">
    <a class="member-brand" th:href="@{/portal}">
        <strong>SPRING MNGT</strong>
        <span>MEMBER PORTAL</span>
    </a>
    <nav class="member-nav">
        <a th:href="@{/portal}">Trang chủ</a>
        <a th:href="@{/portal/branches}" class="active">Đặt chỗ không gian</a>
        <a th:href="@{/portal/history}">Lịch sử đặt chỗ</a>
        <a th:href="@{/portal/benefits}">Ưu đãi của tôi</a>
        <a th:href="@{/portal/account}">Thông tin tài khoản</a>
    </nav>
    <form th:action="@{/dangXuat}" method="post" class="member-dangXuat">
        <button type="submit">← Đăng xuất</button>
    </form>
</aside>

<main class="member-main">
    <header class="member-topbar">
        <h1>Xin chào <span th:text="${user.hoTen}">Hội viên</span>!</h1>
        <strong th:text="'Hạng: ' + ${rankName}">Hạng: Không có</strong>
    </header>

    <section class="member-content">
        <div th:replace="~{web/fragments/alerts :: messages}"></div>
        <div class="section-title">
            <p>Hệ thống Chi nhánh Spring</p>
            <h2>Chọn chi nhánh để xem sơ đồ</h2>
        </div>

        <div class="branch-list">
            <article class="branch-card" th:each="branch : ${hienThiChiNhanh}">
                <div class="branch-code" th:text="${branch.maCN}">CN001</div>
                <div class="branch-info">
                    <h3 th:text="${branch.tenCN}">Chi nhánh 1</h3>
                    <p>
                        <span th:text="'Địa chỉ: ' + ${branch.diaChi}">Địa chỉ</span>
                        <span th:text="'Giờ: ' + ${branch.thoiGianMoCua} + ' - ' + ${branch.thoiGianDongCua}">Giờ</span>
                        <span th:text="'SĐT: ' + ${branch.duongDayNong}">SĐT</span>
                    </p>
                </div>
                <div class="branch-actions">
                    <span class="status-pill">Hoạt động</span>
                    <a th:href="@{'/portal/branches/' + ${branch.maCN} + '/spaces'}"
                       class="button-primary branch-map-link"
                       th:data-requires-contact="${missingContactInfo}">Xem sơ đồ</a>
                </div>
            </article>
        </div>
    </section>
</main>
<script>
    document.querySelectorAll(".branch-map-link").forEach((link) => {
        link.addEventListener("click", (event) => {
            if (link.dataset.requiresContact === "true") {
                event.preventDefault();
                alert("Vui lòng điền đầy đủ thông tin email, số điện thoại để đặt trước không gian.");
            }
        });
    });
</script>
</body>
</html>
