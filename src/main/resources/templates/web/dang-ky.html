<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo tài khoản - Spring Workspace</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="/css/webapp.css">
</head>
<body class="workspace-auth-page">
<main class="workspace-auth">
    <section class="auth-glass register-glass">
        <a class="auth-brand" th:href="@{/}">SPRING WORKSPACE</a>
        <div class="auth-title">
            <h1>Tạo tài khoản</h1>
            <p>Nhập thông tin và xác thực OTP qua email</p>
        </div>

        <div th:replace="~{web/fragments/alerts :: messages}"></div>

        <form th:action="@{/register}" th:object="${DangKyWebForm}" method="post" class="workspace-form">
            <label>
                Tên đăng nhập
                <input type="text" th:field="*{tenTaiKhoan}">
                <span class="field-error" th:if="${#fields.hasErrors('tenTaiKhoan')}" th:errors="*{tenTaiKhoan}"></span>
            </label>
            <label>
                Họ và tên
                <input type="text" th:field="*{hoTen}">
                <span class="field-error" th:if="${#fields.hasErrors('hoTen')}" th:errors="*{hoTen}"></span>
            </label>
            <label>
                Email
                <input type="email" th:field="*{email}">
                <span class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </label>
            <label>
                Mật khẩu
                <input type="password" th:field="*{matKhau}">
                <span class="field-error" th:if="${#fields.hasErrors('matKhau')}" th:errors="*{matKhau}"></span>
            </label>
            <label>
                Xác nhận mật khẩu
                <input type="password" th:field="*{xacNhanMatKhau}">
                <span class="field-error" th:if="${#fields.hasErrors('xacNhanMatKhau')}" th:errors="*{xacNhanMatKhau}"></span>
            </label>
            <button type="submit" class="pink-button submit">Gửi mã OTP</button>
        </form>

        <p class="auth-switch">Đã có tài khoản? <a th:href="@{/dangNhap}">Đăng nhập</a></p>
    </section>

    <section class="auth-hero-copy">
        <div>
            <h2>SPRING WORKSPACE</h2>
            <p>Tài khoản web giúp hội viên đặt chỗ mà không cần tải app Java về máy khách.</p>
        </div>
    </section>
</main>
</body>
</html>
