<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - Spring Workspace</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" th:href="@{/css/webapp.css}">
</head>
<body class="workspace-auth-page">
<main class="workspace-auth">
    <section class="auth-glass otp-glass">
        <a class="auth-brand-link" th:href="@{/}" aria-label="Về trang chủ">
            <img class="auth-brand-icon" th:src="@{/icons/cherry-blossom-32x32.png}" alt="" aria-hidden="true">
            <span>SPRING WORKSPACE</span>
        </a>
        <div class="auth-title">
            <h1>Quên mật khẩu</h1>
            <p>Nhập email hoặc tên tài khoản để nhận OTP</p>
        </div>

        <div th:replace="~{web/fragments/alerts :: messages}"></div>

        <form th:action="@{/quen-mat-khau/gui-otp}" th:object="${QuenMatKhauWebForm}" method="post" class="workspace-form" data-loading-form>
            <label>
                Email hoặc tên tài khoản
                <input type="text" th:field="*{dinhDanh}" autocomplete="username">
                <span class="field-error" th:if="${#fields.hasErrors('dinhDanh')}" th:errors="*{dinhDanh}"></span>
            </label>
            <button type="submit" class="pink-button submit auth-submit-btn js-submit-loading" data-loading-text="Đang gửi OTP...">
                <span class="btn-label">Gửi mã OTP</span>
                <span class="btn-spinner" aria-hidden="true"></span>
            </button>
        </form>

        <p class="auth-switch">Nhớ mật khẩu? <a th:href="@{/dangNhap}">Đăng nhập</a></p>
    </section>

    <section class="auth-hero-copy">
        <div>
            <h2>SPRING WORKSPACE</h2>
            <p>Lấy lại quyền truy cập tài khoản web WMS bằng mã OTP gửi qua email.</p>
        </div>
    </section>
</main>
<script th:src="@{/js/auth-ui.js}" defer></script>
</body>
</html>
