# Spring Boot config - SAO CHEP file nay thanh application.properties roi dien thong tin cua ban

spring.application.name=wms-backend

# Oracle Database - doi thanh thong tin may ban
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:XE
spring.datasource.username=YOUR_ORACLE_USERNAME
spring.datasource.password=YOUR_ORACLE_PASSWORD
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=YOUR_SECRET_KEY_MIN_32_CHARS
jwt.expiration=86400000

# WebSocket
spring.websocket.enabled=true

# VNPay (dien khi tich hop thanh toan)
vnpay.tmn-code=YOUR_TMN_CODE
vnpay.hash-secret=YOUR_HASH_SECRET
vnpay.url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.return-url=http://localhost:8080/api/payments/callback

# Server
server.port=8080
